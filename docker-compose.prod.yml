services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  janus:
    image: sucwangsr/janus-webrtc-gateway-docker:latest
    command: ["sh", "-c", "nginx && /usr/local/bin/janus -F /usr/local/etc/janus"]
    ports:
      - "8088:8088"
      - "8188:8188"
      - "10000-10200:10000-10200/udp"
    volumes:
      - ./backend/janus-conf/janus.jcfg:/usr/local/etc/janus/janus.jcfg
      - ./backend/janus-conf/janus.plugin.videoroom.jcfg:/usr/local/etc/janus/janus.plugin.videoroom.jcfg
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6.2
    network_mode: "host"
    entrypoint: ["turnserver"]
    command:
      - -n
      - --log-file=stdout
      - --realm=${TURN_REALM}
      - --user=${TURN_USER}:${TURN_PASS}
      # Bind on all interfaces, but relay only on the public IP to avoid
      # allocating ports on Docker bridges (172.x) and exhausting the range.
      - --listening-ip=${TURN_LISTENING_IP:-0.0.0.0}
      - --relay-ip=${TURN_RELAY_IP}
      - --external-ip=${TURN_EXTERNAL_IP}
      - --listening-port=${TURN_LISTENING_PORT:-3478}
      # Increase/adjust relay port range if you see "no available ports".
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
      - --no-cli
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file: ./.env.prod
    depends_on:
      - postgres
      - redis
      - janus
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
    env_file: ./.env.prod
    depends_on:
      - postgres
    entrypoint: ["/usr/local/bin/goose"]
    command: ["-dir", "/app/migrations", "postgres", "${PG_DSN}", "up"]
    restart: "no"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
        NEXT_PUBLIC_STUN_URLS: ${NEXT_PUBLIC_STUN_URLS}
        NEXT_PUBLIC_TURN_URLS: ${NEXT_PUBLIC_TURN_URLS}
        NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME}
        NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL}
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "8443:443"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - backend
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:2.21.4
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./deploy/monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/var/lib/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./deploy/monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  portainer_data:
  loki_data:
  promtail_positions:
  grafana_data:
