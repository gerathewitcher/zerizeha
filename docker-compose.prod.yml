version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  janus:
    image: sucwangsr/janus-webrtc-gateway-docker:latest
    command: ["sh", "-c", "nginx && /usr/local/bin/janus -F /usr/local/etc/janus"]
    ports:
      - "8088:8088"
      - "8188:8188"
      - "10000-10200:10000-10200/udp"
    volumes:
      - ./backend/janus-conf/janus.jcfg:/usr/local/etc/janus/janus.jcfg
      - ./backend/janus-conf/janus.plugin.videoroom.jcfg:/usr/local/etc/janus/janus.plugin.videoroom.jcfg
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6.2
    network_mode: "host"
    entrypoint: ["turnserver"]
    command:
      - -n
      - --log-file=stdout
      - --realm=${TURN_REALM}
      - --user=${TURN_USER}:${TURN_PASS}
      # Bind on all interfaces, but relay only on the public IP to avoid
      # allocating ports on Docker bridges (172.x) and exhausting the range.
      - --listening-ip=${TURN_LISTENING_IP:-0.0.0.0}
      - --relay-ip=${TURN_RELAY_IP}
      - --external-ip=${TURN_EXTERNAL_IP}
      - --listening-port=${TURN_LISTENING_PORT:-3478}
      # Increase/adjust relay port range if you see "no available ports".
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
      - --no-cli
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file: ./.env.prod
    depends_on:
      - postgres
      - redis
      - janus
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
    env_file: ./.env.prod
    depends_on:
      - postgres
    entrypoint: ["/usr/local/bin/goose"]
    command: ["-dir", "/app/migrations", "postgres", "${PG_DSN}", "up"]
    restart: "no"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
        NEXT_PUBLIC_STUN_URLS: ${NEXT_PUBLIC_STUN_URLS}
        NEXT_PUBLIC_TURN_URLS: ${NEXT_PUBLIC_TURN_URLS}
        NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME}
        NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL}
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "8443:443"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - backend
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    command:
      - --disable_metrics=percpu,process,sched,tcp,udp,disk,diskIO
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=3d
      - --storage.tsdb.retention.size=1GB
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
