<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zerizeha</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0b0b0c;
        color: #e8e8ea;
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        border: 1px solid #202025;
        border-radius: 16px;
        padding: 24px 28px;
        background: #141417;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      .subtitle {
        font-size: 13px;
        color: #9aa0a6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title">Запускаем приложение…</p>
      <p class="subtitle">Поднимаем локальный сервер</p>
    </div>
  </body>
</html>
