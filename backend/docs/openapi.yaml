openapi: 3.0.3
info:
  title: Zerizeha API
  version: "1.0"
  description: Zerizeha backend API
servers:
  - url: /
paths:
  /api/ws/webrtc/{connectionId}:
    get:
      operationId: WebRTCWebSocket
      summary: webrtc signaling websocket
      description: WebSocket upgrade endpoint for Janus signaling (offer/answer/trickle)
      tags:
        - Voice
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: connectionId
          required: true
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
  /api/ws/voice/{spaceId}:
    get:
      operationId: VoicePresenceWebSocket
      summary: voice presence websocket
      description: WebSocket that pushes voice members updates for a space (replaces members polling + heartbeat)
      tags:
        - Voice
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: spaceId
          required: true
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
  /api/auth/health:
    get:
      operationId: Health
      summary: health check
      description: health check
      tags:
        - Auth
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /api/auth/google:
    get:
      operationId: GoogleLogin
      summary: start google oauth
      description: redirects to Google OAuth
      tags:
        - Auth
      responses:
        '307':
          description: Temporary Redirect
  /api/auth/google/callback:
    get:
      operationId: GoogleCallback
      summary: google oauth callback
      description: exchanges code, returns tokens
      tags:
        - Auth
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
