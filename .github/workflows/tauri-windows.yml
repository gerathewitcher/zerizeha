name: Build Windows Desktop

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target

      - name: Install dependencies
        run: npm install

      - name: Download Node runtime
        shell: pwsh
        run: |
          $nodeVersion = "v20.11.1"
          $zipName = "node-$nodeVersion-win-x64.zip"
          $url = "https://nodejs.org/dist/$nodeVersion/$zipName"
          Invoke-WebRequest -Uri $url -OutFile $zipName
          Expand-Archive -Path $zipName -DestinationPath node-dist
          Copy-Item -Path "node-dist/node-$nodeVersion-win-x64/node.exe" -Destination "src-tauri/bin/node.exe" -Force

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zerizeha-windows
          path: web/src-tauri/target/release/bundle/**
